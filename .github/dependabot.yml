version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      nextjs:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      dev-tools:
        patterns:
          - eslint*
          - prettier*
          - typescript
          - "@types/*"
          - tailwindcss
          - postcss
          - autoprefixer

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
